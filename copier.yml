_subdirectory: template
_templates_suffix: .jinja
_envops:
  block_start_string: "[%"
  block_end_string: "%]"
  variable_start_string: "[["
  variable_end_string: "]]"
  comment_start_string: "[#"
  comment_end_string: "#]"
_exclude: []

project_name:
  type: str
  help: Human-readable project name
  default: "FastAPI Service"

project_slug:
  type: str
  help: Python-safe project name
  default: "fastapi-service"

project_description:
  type: str
  help: Short description of the service
  default: "A FastAPI backend service"

module_name:
  type: str
  help: Python module name (PEP 508 normalized)
  default: "[[ project_slug | replace('-', '_') | replace(' ', '_') | lower ]]"

python_version:
  type: str
  help: Minimum Python version
  default: "3.11"

database:
  type: str
  help: Persistence backend
  choices:
    No database: none
    PostgreSQL: postgresql
  default: none

orm:
  type: str
  help: PostgreSQL ORM
  choices:
    SQLAlchemy: sqlalchemy
    SQLModel: sqlmodel
  default: sqlalchemy
  when: "[[ database == 'postgresql' ]]"

background_tasks:
  type: str
  help: Distributed background task capability
  choices:
    No background tasks: none
    Taskiq: taskiq
  default: none

agent_capability:
  type: str
  help: Single-turn agent capability
  choices:
    No agent: none
    Pydantic AI: pydantic-ai
  default: none

telemetry:
  type: str
  help: Observability integration
  choices:
    No telemetry: none
    Logfire: logfire
  default: none

docker:
  type: bool
  help: Generate Docker deployment assets
  default: true

reverse_proxy:
  type: str
  help: External reverse proxy configuration
  choices:
    No reverse proxy: none
    Nginx: nginx
  default: none
  when: "[[ docker ]]"

ci:
  type: str
  help: Continuous integration provider
  choices:
    No CI: none
    GitHub Actions: github
  default: github

enable_caching:
  type: bool
  help: Enable Redis-backed HTTP response caching
  default: false

rate_limiting:
  type: str
  help: HTTP rate limiting
  choices:
    Disabled: none
    Process memory: memory
    Shared Redis: redis
  default: none

rate_limit_requests:
  type: int
  help: Requests allowed in each rate limit window
  default: 100
  when: "[[ rate_limiting != 'none' ]]"
  validator: "[% if rate_limit_requests < 1 %]Must be at least 1[% endif %]"

rate_limit_period_seconds:
  type: int
  help: Rate limit window length in seconds
  default: 60
  when: "[[ rate_limiting != 'none' ]]"
  validator: "[% if rate_limit_period_seconds < 1 %]Must be at least 1[% endif %]"

deployment_api_key:
  type: str
  secret: true
  help: Deployment API key shared by all callers
  default: "dev-key-CHANGEME"
